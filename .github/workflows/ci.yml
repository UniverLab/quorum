name: CI

on:
  pull_request:
  workflow_dispatch:

# CI only reads the checkout — least privilege.
permissions:
  contents: read

# A newer push to the same PR supersedes in-flight CI; cancel the stale run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run coverage

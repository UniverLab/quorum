name: CI

on:
  pull_request:
  workflow_dispatch:

# CI only reads the checkout — least privilege.
permissions:
  contents: read

# A newer push to the same PR supersedes in-flight CI; cancel the stale run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install

      - run: npm run coverage

  # PRs into main must bump package.json — the release workflow only tags when
  # the version is new, so an un-bumped PR would merge without ever releasing.
  version-check:
    name: Main PR Version Bump
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bump
        run: |
          current=$(node -p "require('./package.json').version")
          base=$(git show origin/main:package.json | node -p "JSON.parse(require('fs').readFileSync(0)).version")
          if [ "$current" = "$base" ]; then
            echo "❌ package.json version must be bumped for a PR into main ($base)."
            exit 1
          fi
          echo "✅ Version bumped: $base → $current"
